<div class="login-container">
  <div class="login-wrapper">
    <!-- Sidebar decorativo -->
    <div class="login-sidebar">
      <div class="sidebar-content">
        <div class="sidebar-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor"/>
          </svg>
        </div>
        <h2>Sistema POS</h2>
        <p>Ferretería Bolivia</p>
        <div class="sidebar-features">
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Gestión de Ventas</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Control de Inventario</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Reportes en Tiempo Real</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="login-form-container">
      <div class="login-card">
        <!-- Header -->
        <div class="login-header">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 12h10M12 7v10M3 9h18M3 15h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <h1 class="brand-title">Ferretería POS</h1>
          <p class="subtitle">Bienvenido de vuelta</p>
        </div>

        <!-- Formulario -->
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
          <!-- Email Field -->
          <div class="form-group">
            <label for="email" class="form-label">
              <span class="label-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M2 6l10 7 10-7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </span>
              Correo Electrónico
            </label>
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                formControlName="email"
                class="form-control"
                [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                [class.is-valid]="loginForm.get('email')?.touched && loginForm.get('email')?.valid"
                placeholder="tu@correo.com"
                [disabled]="loading"
              />
              <span class="input-icon" *ngIf="loginForm.get('email')?.valid && loginForm.get('email')?.touched">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
              </span>
            </div>
            <span class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
              {{ getEmailError() }}
            </span>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="password" class="form-label">
              <span class="label-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="3" y="10" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M7 10V7C7 4.24 9.24 2 12 2s5 2.24 5 5v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="12" cy="17" r="1" fill="currentColor"/>
                </svg>
              </span>
              Contraseña
            </label>
            <div class="input-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                formControlName="password"
                class="form-control"
                [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                [class.is-valid]="loginForm.get('password')?.touched && loginForm.get('password')?.valid"
                placeholder="••••••••"
                [disabled]="loading"
              />
              <button
                type="button"
                class="eye-toggle"
                (click)="togglePasswordVisibility()"
                tabindex="-1"
              >
                <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 5C7 5 2.73 8.11 1 12.46c1.73 4.35 6 7.54 11 7.54s9.27-3.19 11-7.54C21.27 8.11 17 5 12 5zm0 12.5c-2.49 0-4.5-2.01-4.5-4.5s2.01-4.5 4.5-4.5 4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5z" fill="currentColor"/>
                </svg>
                <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.81-2.92 3.69-4.75-1.73-4.35-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 11.5c1.73 4.35 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm6.15-6.15l1.41-1.41-1.41 1.41z" fill="currentColor"/>
                </svg>
              </button>
            </div>
            <span class="error-message" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
              {{ getPasswordError() }}
            </span>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert-error">
            <span class="error-icon">
              <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
              </svg>
            </span>
            <span>{{ errorMessage }}</span>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn-submit"
            [disabled]="loading || loginForm.invalid"
          >
            <span *ngIf="!loading" class="btn-text">Iniciar Sesión</span>
            <span *ngIf="loading" class="btn-loading">
              <span class="spinner"></span>
              Autenticando...
            </span>
          </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-section">
          <p class="demo-label">Credenciales de Demostración:</p>
          <button
            type="button"
            class="demo-btn"
            *ngFor="let demo of suggestions"
            (click)="fillDemo(demo.email, demo.password)"
            [disabled]="loading"
          >
            <span class="demo-email">{{ demo.email }}</span>
            <span class="demo-arrow">→</span>
          </button>
        </div>

        <!-- Footer -->
        <div class="login-footer">
          <p class="footer-text">
            <span class="lock-icon">
              <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
              </svg>
            </span>
            Tu información está protegida
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
